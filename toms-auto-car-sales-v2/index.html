<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tom's Auto Car Sales</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        // Wait for Supabase to load
        window.addEventListener('load', function() {
            if (typeof supabase !== 'undefined') {
                console.log('Supabase loaded via load event');
            }
        });
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: rgba(20, 20, 20, 0.8);
            --neon-green: #39ff14;
            --neon-pink: #ff00ff;
            --neon-cyan: #00ffff;
            --text-light: #e0e0e0;
            --text-dim: #888;
            --border-glow: rgba(57, 255, 20, 0.3);
        }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at 20% 80%, rgba(57, 255, 20, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 0, 255, 0.05) 0%, transparent 50%),
                linear-gradient(180deg, #0a0a0a 0%, #111 100%);
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 40px 0; position: relative; }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--neon-green), var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(57, 255, 20, 0.5);
            letter-spacing: 4px;
        }
        h1::before {
            content: "TOM'S AUTO";
            display: block;
            font-size: 1rem;
            letter-spacing: 8px;
            color: var(--neon-pink);
            -webkit-text-fill-color: var(--neon-pink);
            text-shadow: none;
            margin-bottom: 5px;
        }
        .auth-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }
        .auth-screen:not(.active) { display: none; }
        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.1);
        }
        .auth-card h2 {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            margin-bottom: 30px;
            color: var(--neon-green);
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-dim);
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            border-radius: 8px;
            color: var(--text-light);
            font-family: inherit;
            font-size: 1rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.2);
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--neon-green), var(--neon-cyan));
            border: none;
            border-radius: 8px;
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn:hover {
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.4);
        }
        .btn-small { padding: 8px 16px; font-size: 0.8rem; width: auto; }
        .btn-pink { background: linear-gradient(135deg, var(--neon-pink), #ff6600); }
        .error-msg {
            color: #ff4444;
            text-align: center;
            margin-top: 10px;
            font-size: 0.9rem;
        }
        .toggle-link {
            text-align: center;
            margin-top: 20px;
            color: var(--text-dim);
        }
        .toggle-link a {
            color: var(--neon-green);
            cursor: pointer;
            text-decoration: none;
        }
        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
        }
        .stat-card h3 {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        .stat-card .value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            color: var(--neon-green);
        }
        .car-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 25px;
        }
        .car-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 15px;
            padding: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .car-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(57, 255, 20, 0.2);
        }
        .car-card .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .car-card .year-make { color: var(--neon-cyan); font-size: 1.2rem; }
        .car-card .price { color: var(--neon-pink); font-family: 'Orbitron', sans-serif; font-size: 1.3rem; }
        .car-card .details { color: var(--text-dim); margin-bottom: 10px; }
        .car-card .mileage { color: var(--text-dim); }
        .car-card .status {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 10px;
        }
        .car-card .status.available { background: rgba(57, 255, 20, 0.2); color: var(--neon-green); }
        .car-card .status.sold { background: rgba(255, 0, 255, 0.2); color: var(--neon-pink); }
        .car-card .actions { margin-top: 15px; display: flex; gap: 10px; }
        .loading-screen { text-align: center; padding: 100px; color: var(--text-dim); }
        .loading-screen:not(.active) { display: none; }
    </style>
</head>
<body>
    <!-- Auth Screen -->
    <div class="auth-screen active" id="authScreen">
        <div class="auth-card">
            <h2 id="authTitle">Sign In</h2>
            <form id="authForm">
                <div class="form-group full">
                    <label>Email</label>
                    <input type="email" id="authEmail" required>
                </div>
                <div class="form-group full">
                    <label>Password</label>
                    <input type="password" id="authPassword" required>
                </div>
                <button type="submit" class="btn" id="authBtn">Sign In</button>
                <div class="error-msg" id="authError"></div>
            </form>
            <div class="toggle-link">
                <span id="toggleText">Don't have an account?</span> 
                <a id="toggleAuth" href="#">Sign Up</a>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div class="container" id="appScreen" style="display: none;">
        <header>
            <h1>Tom's Auto Car Sales</h1>
        </header>
        
        <div class="user-bar">
            <span class="user-email" id="userEmail"></span>
            <button class="btn btn-small btn-pink" id="signOutBtn">Sign Out</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>TOTAL CARS</h3>
                <div class="value" id="totalCars">0</div>
            </div>
            <div class="stat-card">
                <h3>SOLD</h3>
                <div class="value" id="carsSold">0</div>
            </div>
            <div class="stat-card">
                <h3>AVAILABLE</h3>
                <div class="value" id="carsAvailable">0</div>
            </div>
            <div class="stat-card">
                <h3>TOTAL REVENUE</h3>
                <div class="value" id="totalRevenue">$0</div>
            </div>
        </div>

        <button class="btn" id="addCarBtn" style="margin-bottom: 20px; max-width: 200px;">+ Add Car</button>

        <div class="car-grid" id="carGrid">
            <!-- Cars will be rendered here -->
        </div>
    </div>

    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <h2>LOADING...</h2>
    </div>

    <!-- Add Car Modal -->
    <div id="carModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: var(--bg-card); padding: 30px; border-radius: 20px; max-width: 500px; width: 90%;">
            <h2 id="carModalTitle" style="color: var(--neon-green); margin-bottom: 20px;">Add Car</h2>
            <form id="carForm">
                <div class="form-group">
                    <label>Year</label>
                    <input type="number" id="carYear" required>
                </div>
                <div class="form-group">
                    <label>Make</label>
                    <input type="text" id="carMake" required>
                </div>
                <div class="form-group">
                    <label>Model</label>
                    <input type="text" id="carModel" required>
                </div>
                <div class="form-group">
                    <label>Price ($)</label>
                    <input type="number" id="carPrice" required>
                </div>
                <div class="form-group">
                    <label>Mileage</label>
                    <input type="number" id="carMileage" required>
                </div>
                <div class="form-group">
                    <label>VIN</label>
                    <input type="text" id="carVin">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="carStatus">
                        <option value="available">Available</option>
                        <option value="sold">Sold</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Sold Price ($) (if sold)</label>
                    <input type="number" id="carSoldPrice">
                </div>
                <button type="submit" class="btn">Save Car</button>
                <button type="button" class="btn btn-pink" id="cancelCarBtn" style="margin-top: 10px;">Cancel</button>
            </form>
        </div>
    </div>

    <script>
        // Supabase Config
        const SUPABASE_URL = 'https://mwdvaohdgaclihatawpn.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im13ZHZhb2hkZ2FjbGloYXRhd3BuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNzk1NzIsImV4cCI6MjA5NTY1NTU3Mn0.oyaZFi9OtggYXxHbQvgyoZtbmSXxNr-YFRHMtFq8p8M';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let cars = [];
        let user = null;
        let authMode = 'signin';
        let editingCarId = null;

        // Auth Functions
        async function toggleAuthMode() {
            authMode = authMode === 'signin' ? 'signup' : 'signin';
            document.getElementById('authTitle').textContent = authMode === 'signin' ? 'Sign In' : 'Sign Up';
            document.getElementById('authBtn').textContent = authMode === 'signin' ? 'Sign In' : 'Sign Up';
            document.getElementById('toggleText').textContent = authMode === 'signin' ? "Don't have an account?" : "Already have an account?";
            document.getElementById('toggleAuth').textContent = authMode === 'signin' ? 'Sign Up' : 'Sign In';
            document.getElementById('authError').textContent = '';
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            const errorEl = document.getElementById('authError');
            errorEl.textContent = '';

            try {
                if (authMode === 'signin') {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    user = data.user;
                } else {
                    const { data, error } = await supabase.auth.signUp({ email, password });
                    if (error) throw error;
                    if (data.user && !data.session) {
                        errorEl.textContent = 'Check your email to confirm signup!';
                        return;
                    }
                    user = data.user;
                }
                loadCars();
            } catch (err) {
                errorEl.textContent = err.message;
            }
        });

        async function signOut() {
            await supabase.auth.signOut();
            user = null;
            cars = [];
            showAuth();
        }

        function showAuth() {
            document.getElementById('authScreen').classList.add('active');
            document.getElementById('appScreen').style.display = 'none';
            document.getElementById('loadingScreen').style.display = 'none';
        }

        function showApp() {
            document.getElementById('authScreen').classList.remove('active');
            document.getElementById('appScreen').style.display = 'block';
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('userEmail').textContent = user.email;
        }

        // Database Functions
        async function loadCars() {
            if (!user) return;
            showApp();
            
            const { data, error } = await supabase
                .from('cars')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Error loading cars:', error);
                return;
            }

            cars = data || [];
            renderCars();
            updateStats();
        }

        async function saveCar(carData) {
            if (editingCarId) {
                const { error } = await supabase
                    .from('cars')
                    .update(carData)
                    .eq('id', editingCarId);
                if (error) throw error;
            } else {
                const { error } = await supabase
                    .from('cars')
                    .insert([{ ...carData, user_id: user.id }]);
                if (error) throw error;
            }
            loadCars();
        }

        async function deleteCar(id) {
            if (!confirm('Delete this car?')) return;
            const { error } = await supabase.from('cars').delete().eq('id', id);
            if (error) {
                alert('Error deleting car: ' + error.message);
                return;
            }
            loadCars();
        }

        // UI Functions
        function renderCars() {
            const grid = document.getElementById('carGrid');
            grid.innerHTML = cars.map(car => `
                <div class="car-card" data-car-id="${car.id}">
                    <div class="header">
                        <span class="year-make">${car.year} ${car.make}</span>
                        <span class="price">$${car.price?.toLocaleString()}</span>
                    </div>
                    <div class="details">${car.model}</div>
                    <div class="mileage">${car.mileage?.toLocaleString()} miles</div>
                    ${car.vin ? `<div class="mileage">VIN: ${car.vin}</div>` : ''}
                    <span class="status ${car.status}">${car.status}</span>
                    ${car.status === 'sold' && car.sold_price ? `<div class="mileage" style="color: var(--neon-pink);">Sold for: $${car.sold_price.toLocaleString()}</div>` : ''}
                    <div class="actions">
                        <button class="btn btn-small btn-edit" data-id="${car.id}">Edit</button>
                        <button class="btn btn-small btn-pink btn-delete" data-id="${car.id}">Delete</button>
                    </div>
                </div>
            `).join('');

            // Event delegation for car actions
            grid.querySelectorAll('.btn-edit').forEach(btn => {
                btn.addEventListener('click', () => editCar(btn.dataset.id));
            });
            grid.querySelectorAll('.btn-delete').forEach(btn => {
                btn.addEventListener('click', () => deleteCar(btn.dataset.id));
            });
            
            if (cars.length === 0) {
                grid.innerHTML = '<p style="text-align: center; color: var(--text-dim); grid-column: 1/-1;">No cars yet. Add your first car to get started!</p>';
            }
        }

        function updateStats() {
            const total = cars.length;
            const sold = cars.filter(c => c.status === 'sold').length;
            const available = total - sold;
            const revenue = cars.filter(c => c.status === 'sold').reduce((sum, c) => sum + (c.sold_price || 0), 0);

            document.getElementById('totalCars').textContent = total;
            document.getElementById('carsSold').textContent = sold;
            document.getElementById('carsAvailable').textContent = available;
            document.getElementById('totalRevenue').textContent = '$' + revenue.toLocaleString();
        }

        function showAddCarModal() {
            editingCarId = null;
            document.getElementById('carModalTitle').textContent = 'Add Car';
            document.getElementById('carForm').reset();
            document.getElementById('carModal').style.display = 'flex';
        }

        function editCar(id) {
            const car = cars.find(c => c.id === id);
            if (!car) return;
            
            editingCarId = id;
            document.getElementById('carModalTitle').textContent = 'Edit Car';
            document.getElementById('carYear').value = car.year;
            document.getElementById('carMake').value = car.make;
            document.getElementById('carModel').value = car.model;
            document.getElementById('carPrice').value = car.price;
            document.getElementById('carMileage').value = car.mileage;
            document.getElementById('carVin').value = car.vin || '';
            document.getElementById('carStatus').value = car.status;
            document.getElementById('carSoldPrice').value = car.sold_price || '';
            document.getElementById('carModal').style.display = 'flex';
        }

        function closeCarModal() {
            document.getElementById('carModal').style.display = 'none';
        }

        document.getElementById('carForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const carData = {
                year: parseInt(document.getElementById('carYear').value),
                make: document.getElementById('carMake').value,
                model: document.getElementById('carModel').value,
                price: parseInt(document.getElementById('carPrice').value),
                mileage: parseInt(document.getElementById('carMileage').value),
                vin: document.getElementById('carVin').value,
                status: document.getElementById('carStatus').value,
                sold_price: document.getElementById('carStatus').value === 'sold' ? parseInt(document.getElementById('carSoldPrice').value) || null : null
            };

            try {
                await saveCar(carData);
                closeCarModal();
            } catch (err) {
                alert('Error saving car: ' + err.message);
            }
        });

        // Initialize
        async function initAuth() {
            document.getElementById('loadingScreen').style.display = 'block';
            document.getElementById('authScreen').classList.remove('active');

            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                user = session.user;
                loadCars();
            } else {
                showAuth();
            }

            supabase.auth.onAuthStateChange((event, session) => {
                if (session) {
                    user = session.user;
                    loadCars();
                } else {
                    user = null;
                    cars = [];
                    showAuth();
                }
            });
        }

        initAuth();

        // Add event listeners (Netlify-friendly)
        document.getElementById('toggleAuth').addEventListener('click', (e) => {
            e.preventDefault();
            toggleAuthMode();
        });
        document.getElementById('signOutBtn').addEventListener('click', signOut);
        document.getElementById('addCarBtn').addEventListener('click', showAddCarModal);
        document.getElementById('cancelCarBtn').addEventListener('click', closeCarModal);
    </script>
</body>
</html>
